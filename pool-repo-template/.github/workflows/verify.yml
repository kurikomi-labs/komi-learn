name: Verify learnings

# Re-verify every contributed learning on each PR and push. This is the safety
# gate: it independently recomputes content-addressed ids, checks signatures, and
# re-runs the scrub so nothing tampered, unsigned, or identifying can merge.
#
# The verifier is VENDORED at .github/scripts/verify.py (only blake3 + pynacl from
# PyPI) so this repo verifies itself with no dependency on the komi-learn package.

on:
  pull_request:
    paths: ["learnings/**"]
  push:
    branches: [main]
    paths: ["learnings/**"]

permissions:
  contents: read

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0   # need base to diff changed files on PRs

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install verifier dependencies
        run: python -m pip install --upgrade pip blake3 pynacl

      - name: Determine changed learning files (PRs)
        id: changed
        if: github.event_name == 'pull_request'
        run: |
          BASE="${{ github.event.pull_request.base.sha }}"
          FILES=$(git diff --name-only --diff-filter=ACM "$BASE"...HEAD -- 'learnings/**/*.md' | tr '\n' ' ')
          echo "files=$FILES" >> "$GITHUB_OUTPUT"

      - name: Verify changed files (PR)
        if: github.event_name == 'pull_request'
        run: |
          if [ -z "${{ steps.changed.outputs.files }}" ]; then
            echo "No learning files changed."
          else
            python .github/scripts/verify.py --changed ${{ steps.changed.outputs.files }}
          fi

      - name: Build base/new file pairs (for append-only + identity checks)
        id: pairs
        if: github.event_name == 'pull_request'
        run: |
          # For every changed learning file, stage its BASE version next to the NEW
          # one. A newly added file has no base (git show fails) → '-' sentinel.
          BASE="${{ github.event.pull_request.base.sha }}"
          PAIRS=""
          mkdir -p "$RUNNER_TEMP/base"
          for f in ${{ steps.changed.outputs.files }}; do
            safe=$(echo "$f" | tr '/' '_')
            if git show "$BASE:$f" > "$RUNNER_TEMP/base/$safe" 2>/dev/null; then
              PAIRS="$PAIRS $RUNNER_TEMP/base/$safe $f"
            else
              PAIRS="$PAIRS - $f"
            fi
          done
          echo "pairs=$PAIRS" >> "$GITHUB_OUTPUT"

      - name: Enforce append-only signatures (no corroboration downgrade)
        if: github.event_name == 'pull_request' && steps.pairs.outputs.pairs != ''
        run: python .github/scripts/verify.py --append-only ${{ steps.pairs.outputs.pairs }}

      - name: Enforce signer↔account binding (PR author == signer; Sybil resistance)
        if: github.event_name == 'pull_request' && steps.pairs.outputs.pairs != ''
        env:
          GH_TOKEN: ${{ github.token }}   # lets the account-age check call the gh API
        run: |
          # Every signature this PR ADDS must be bound to the PR author's GitHub
          # account (github_user inside the signed bytes), and the account must clear
          # the age bar. This is what makes "N signers" mean "N real accounts".
          python .github/scripts/verify.py --identity "${{ github.event.pull_request.user.login }}" ${{ steps.pairs.outputs.pairs }}

      - name: Verify all files (push to main)
        if: github.event_name == 'push'
        run: python .github/scripts/verify.py
